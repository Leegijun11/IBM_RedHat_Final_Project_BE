name: Deploy Backend to AWS ECS

on:
  push:
    branches:
      - main 

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: backend-ecr
  ECS_CLUSTER: backend-cluster
  ECS_SERVICE: backend-td-service

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub 코드를 가상 서버로 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. AWS 권한 인증 (GitHub Secrets의 2종 키 사용)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. AWS ECR 레지스트리 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Docker 이미지 빌드 및 AWS ECR로 업로드 (✨ 깃 커밋 해시 태그와 latest 태그 동시 생성)
      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # 고유 태그(IMAGE_TAG)와 최신 태그(latest)를 둘 다 붙여서 빌드합니다.
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          
          # 생성된 두 태그의 이미지를 모두 ECR에 푸시합니다.
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
        working-directory: ./backend

      # 5. ECS 서비스 강제 업데이트 (ECR에 올라간 최신 latest 이미지를 땡겨와서 재구동)
      - name: Deploy to Amazon ECS Service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment