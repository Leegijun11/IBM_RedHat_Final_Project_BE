name: Deploy Backend to AWS ECS

on:
  push:
    branches:
      - main 

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: backend-ecr
  ECS_CLUSTER: backend-cluster
  ECS_SERVICE: backend-td-service
  TASK_DEFINITION_FAMILY: backend-td  # 태스크 정의 패밀리 이름

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub 코드를 가상 서버로 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. AWS 권한 인증
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. AWS ECR 레지스트리 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Docker 이미지 빌드 및 AWS ECR로 업로드
      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # 고유 태그(IMAGE_TAG)와 최신 태그(latest)를 둘 다 붙여서 빌드
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          
          # 생성된 두 태그의 이미지를 모두 ECR에 푸시
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
        working-directory: ./backend

      # 5. AWS에서 현재 활성화된 최신 태스크 정의 다운로드
      - name: Download active task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_DEFINITION_FAMILY }} \
            --query taskDefinition > task-definition.json

      # 6. 다운로드한 태스크 정의 파일 내의 이미지 경로를 새로 빌드된 이미지 태그 정보로 교체
      - name: Fill in the new image ID in the Amazon ECS task definition
        id: render-web-container
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: backend-container  # ⚠️ AWS ECS 콘솔 -> 태스크 정의에 적힌 '컨테이너 이름'과 정확히 일치해야 합니다!
          image: ${{ steps.build-image.outputs.image }}

      # 7. 수정된 새 태스크 정의를 자동으로 ECS 서비스에 배포 (새로운 버전 번호가 자동 생성됨)
      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-web-container.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true  # 배포가 완료되고 서비스가 안정화될 때까지 GitHub Actions가 기다립니다.